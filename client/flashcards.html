<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
background:#0d1117;
color:white;
font-family:Poppins,sans-serif;
}

.card{
width:700px;
max-width:90%;
margin:80px auto;
padding:40px;
background:#161b22;
border-radius:15px;
text-align:center;
cursor:pointer;
min-height:250px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.controls{
text-align:center;
margin-top:20px;
}

button{
padding:12px 25px;
margin:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1 style="text-align:center">Flashcards</h1>

<div id="card" class="card"></div>

<div class="controls">

<button id="prev">Previous</button>

<button id="next">Next</button>

</div>

<script src="js/flashcards.js"></script>

</body>
</html>
